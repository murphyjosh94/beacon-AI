<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Beacon Prizes Lighthouse Logo</title>
  <desc id="desc">A blue and gold circular lighthouse logo with a gold light beam, navy background inside the gold ring, and waves below.</desc>
  <defs>
    <radialGradient id="navyDisc" cx="50%" cy="40%" r="62%">
      <stop offset="0%" stop-color="#092a57"/>
      <stop offset="70%" stop-color="#001c3e"/>
      <stop offset="100%" stop-color="#001128"/>
    </radialGradient>
    <linearGradient id="gold" x1="15%" y1="12%" x2="85%" y2="88%">
      <stop offset="0%" stop-color="#fff1a3"/>
      <stop offset="38%" stop-color="#ffc93f"/>
      <stop offset="72%" stop-color="#d89516"/>
      <stop offset="100%" stop-color="#8e5c08"/>
    </linearGradient>
    <linearGradient id="blue" x1="20%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#22a5ee"/>
      <stop offset="42%" stop-color="#0066b2"/>
      <stop offset="100%" stop-color="#002a61"/>
    </linearGradient>
    <linearGradient id="beam" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#fff9c6" stop-opacity="1"/>
      <stop offset="35%" stop-color="#ffd65a" stop-opacity=".95"/>
      <stop offset="78%" stop-color="#d8961a" stop-opacity=".78"/>
      <stop offset="100%" stop-color="#d8961a" stop-opacity=".25"/>
    </linearGradient>
    <radialGradient id="lampGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="38%" stop-color="#fff6a7"/>
      <stop offset="100%" stop-color="#f5b61e"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000814" flood-opacity=".38"/>
    </filter>
  </defs>

  <!-- transparent canvas outside logo -->
  <g filter="url(#softShadow)">
    <circle cx="512" cy="510" r="340" fill="url(#navyDisc)"/>
    <circle cx="512" cy="510" r="350" fill="none" stroke="url(#gold)" stroke-width="26"/>

    <!-- beacon beam -->
    <path d="M594 344 L965 250 L965 498 L594 409 Z" fill="url(#beam)"/>

    <!-- lighthouse tower -->
    <path d="M425 443 L599 443 L641 820 Q512 858 383 820 Z" fill="url(#blue)" stroke="#001126" stroke-width="9" stroke-linejoin="round"/>
    <path d="M425 574 L598 483 L606 545 L406 655 Z" fill="url(#gold)"/>
    <path d="M404 720 L620 604 L631 665 L383 792 Z" fill="url(#gold)"/>
    <path d="M445 456 L470 817" stroke="#32a9f5" stroke-width="11" stroke-opacity=".55"/>
    <path d="M594 456 L627 818" stroke="#0b4d8e" stroke-width="13" stroke-opacity=".75"/>

    <!-- gallery deck -->
    <rect x="390" y="418" width="244" height="35" rx="7" fill="url(#blue)" stroke="#001126" stroke-width="7"/>
    <path d="M404 374 H620 V422 H404 Z" fill="none" stroke="url(#gold)" stroke-width="9"/>
    <path d="M437 374 V421 M478 374 V421 M520 374 V421 M562 374 V421" stroke="url(#gold)" stroke-width="8"/>

    <!-- lantern room -->
    <path d="M442 295 H582 L600 374 H424 Z" fill="url(#lampGlow)" stroke="#001126" stroke-width="7" stroke-linejoin="round"/>
    <path d="M416 286 L512 190 L608 286 Q512 265 416 286 Z" fill="url(#blue)" stroke="#001126" stroke-width="8" stroke-linejoin="round"/>
    <ellipse cx="512" cy="333" rx="55" ry="50" fill="url(#lampGlow)" opacity=".92"/>

    <!-- waves -->
    <path d="M250 818 C328 772 406 861 512 812 C610 766 684 854 776 803 C747 858 658 879 556 851 C457 824 348 878 250 818 Z" fill="#001126"/>
    <path d="M246 790 C337 735 427 825 513 786 C608 742 685 820 778 774 C736 827 640 843 548 812 C447 778 347 843 246 790 Z" fill="url(#blue)" stroke="#001126" stroke-width="7"/>
    <path d="M292 839 C390 810 454 865 537 835 C624 803 674 849 752 826 C683 875 602 884 514 858 C430 833 366 873 292 839 Z" fill="#0880d5" opacity=".9"/>
  </g>
</svg>
